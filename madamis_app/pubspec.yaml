name: madamis_app
description: TOTEM型対面マーダーミステリー自動進行アプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shelf: ^1.4.2
  shelf_router: ^1.1.4
  shelf_web_socket: ^2.0.1
  web_socket_channel: ^3.0.2
  uuid: ^4.5.1
  qr_flutter: ^4.1.0
  provider: ^6.1.2
  network_info_plus: ^6.1.3
  google_generative_ai: ^0.4.6
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  audioplayers: ^6.4.0
  wifi_iot: ^0.3.19+2
  webview_flutter: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/web/
    - assets/scenarios/
    - assets/audio/se/
    - assets/audio/bgm/
